<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VibePiano 钢琴</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #f1f1f1;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5rem;
      background: linear-gradient(90deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      text-align: center;
      color: #a0a0a0;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    
    .controls {
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    button {
      padding: 12px 28px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .hint {
      color: #b0b0b0;
      font-size: 0.9rem;
    }
    
    .keyboard {
      display: flex;
      user-select: none;
      gap: 4px;
      padding: 30px 40px;
      background: linear-gradient(145deg, #2a2a4a, #1f1f3a);
      border-radius: 15px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    
    .key {
      width: 58px;
      height: 230px;
      border-radius: 0 0 8px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      font-size: 11px;
      background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 80%, #e0e0e0 100%);
      color: #333;
      box-shadow: 
        0 6px 0 #a0a0a0,
        0 8px 10px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 #fff;
      position: relative;
      transition: all 0.08s ease;
      cursor: pointer;
      border: 1px solid #d0d0d0;
    }
    
    .key:hover {
      background: linear-gradient(180deg, #f8f8f8 0%, #e8e8e8 80%, #d8d8d8 100%);
    }
    
    .key .note-label {
      font-weight: bold;
      padding-bottom: 15px;
      opacity: 0.7;
    }
    
    .key .key-hint {
      position: absolute;
      bottom: 40px;
      background: rgba(102, 126, 234, 0.9);
      color: white;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }
    
    .pressed {
      transform: translateY(6px);
      box-shadow: 
        0 1px 0 #a0a0a0,
        0 3px 5px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 #fff;
      background: linear-gradient(180deg, #f0f0f0 0%, #e0e0e0 80%, #d0d0d0 100%);
    }
    
    .pressed .note-label {
      color: #667eea;
    }

    .song-selector {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .song-selector select {
      padding: 10px 15px;
      border-radius: 8px;
      border: 2px solid rgba(102, 126, 234, 0.5);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      min-width: 200px;
    }

    .song-selector select option {
      background: #2a2a4a;
      color: white;
    }

    .song-selector label {
      color: #b0b0b0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>🎹 VibePiano</h1>
  <p class="subtitle">用键盘或鼠标演奏美妙的音乐</p>
  
  <div class="song-selector">
    <label for="songSelect">选择曲目:</label>
    <select id="songSelect">
      <option value="">加载中...</option>
    </select>
  </div>

  <div class="controls">
    <button id="autoPlay">🎵 自动播放</button>
    <span class="hint">提示：键盘 A S D F G H J (中音区)</span>
  </div>

  <div class="keyboard" id="keyboard"></div>

  <script src="main.js?v=5"></script>
</body>
</html>
